<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfect MKT — Gestão de Eventos</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <img src="assets/logo.svg" alt="Perfect MKT">
        <span>Perfect MKT</span>
      </div>

      <nav class="sidebar__nav" id="sidebarNav">
        <a href="#/" class="nav-item" data-route="/">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="#/eventos" class="nav-item" data-route="/eventos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Eventos
        </a>
        <a href="#/clientes" class="nav-item" data-route="/clientes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Clientes
        </a>
        <span class="nav-item nav-item--disabled">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Solicitações
        </span>
        <span class="nav-item nav-item--disabled">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Financeiro
        </span>
      </nav>

      <div class="sidebar__footer">
        Protótipo v2.0
      </div>
    </aside>

    <div class="main">
      <header class="main__header">
        <div class="main__header-left">
          <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h1 class="main__title" id="pageTitle">Dashboard</h1>
        </div>
        <div id="headerActions"></div>
      </header>

      <main class="main__content" id="appContent"></main>
    </div>
  </div>

  <script src="js/clients-mock.js"></script>
  <script src="js/clients-data.js"></script>
  <script src="js/events-mock.js"></script>
  <script src="js/data.js"></script>
  <script src="js/views/home.js"></script>
  <script src="js/views/client-list.js"></script>
  <script src="js/views/client-form.js"></script>
  <script src="js/views/client-detail.js"></script>
  <script src="js/views/event-list.js"></script>
  <script src="js/views/event-form.js"></script>
  <script src="js/views/event-detail.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
